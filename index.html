<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR 椅子展示</title>
    <meta name="description" content="扫码查看3D椅子AR展示，支持手机AR浏览">

    <!-- Google Model Viewer -->
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- QR Code: using API + inline fallback -->

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a2e;
            --accent: #6c63ff;
            --accent-glow: rgba(108, 99, 255, 0.3);
            --accent-light: #8b83ff;
            --text-primary: #f0f0f5;
            --text-secondary: #8888a0;
            --border: rgba(255, 255, 255, 0.08);
            --glass: rgba(26, 26, 46, 0.7);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated background */
        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(108, 99, 255, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(139, 131, 255, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(108, 99, 255, 0.03) 0%, transparent 70%);
            z-index: 0;
            animation: bgShift 15s ease-in-out infinite alternate;
        }

        @keyframes bgShift {
            0% { opacity: 0.7; }
            100% { opacity: 1; }
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        .header {
            text-align: center;
            padding: 40px 0 20px;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-light), var(--accent), #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            letter-spacing: -0.02em;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            font-weight: 300;
        }

        /* Model Viewer Container */
        .viewer-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
            margin: 24px 0;
            box-shadow: 
                0 4px 30px rgba(0, 0, 0, 0.3),
                0 0 60px var(--accent-glow);
            transition: box-shadow 0.4s ease;
        }

        .viewer-card:hover {
            box-shadow: 
                0 8px 40px rgba(0, 0, 0, 0.4),
                0 0 80px var(--accent-glow);
        }

        model-viewer {
            width: 100%;
            height: 500px;
            background: radial-gradient(ellipse at center, #1e1e30, var(--bg-secondary));
            --poster-color: transparent;
        }

        model-viewer::part(default-ar-button) {
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            border: none;
            border-radius: 14px;
            padding: 12px 24px;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            box-shadow: 0 4px 20px var(--accent-glow);
            bottom: 20px;
            right: 20px;
        }

        /* Loading bar */
        .progress-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.1);
        }

        .progress-bar .fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--accent-light));
            transition: width 0.3s ease;
            border-radius: 0 2px 2px 0;
        }

        /* Controls */
        .controls {
            display: flex;
            gap: 12px;
            padding: 16px 20px;
            background: rgba(0, 0, 0, 0.2);
            border-top: 1px solid var(--border);
            flex-wrap: wrap;
        }

        .ctrl-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.25s ease;
            backdrop-filter: blur(10px);
        }

        .ctrl-btn:hover {
            background: var(--accent);
            border-color: var(--accent);
            transform: translateY(-1px);
            box-shadow: 0 4px 15px var(--accent-glow);
        }

        .ctrl-btn.active {
            background: var(--accent);
            border-color: var(--accent);
        }

        .ctrl-btn svg {
            width: 16px;
            height: 16px;
        }

        /* QR Code Section */
        .qr-section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 32px;
            margin: 24px 0;
            text-align: center;
        }

        .qr-section h2 {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .qr-section p {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        .qr-wrapper {
            display: inline-block;
            background: white;
            padding: 16px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        #qr-image {
            display: block;
            width: 200px;
            height: 200px;
            image-rendering: pixelated;
        }

        .qr-url {
            margin-top: 16px;
            padding: 10px 16px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            font-family: monospace;
            font-size: 0.8rem;
            color: var(--text-secondary);
            word-break: break-all;
        }

        /* Instructions */
        .instructions {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin: 24px 0;
        }

        .step-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .step-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
        }

        .step-num {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            border-radius: 12px;
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 12px;
        }

        .step-card h3 {
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .step-card p {
            color: var(--text-secondary);
            font-size: 0.82rem;
            line-height: 1.5;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 30px;
            color: var(--text-secondary);
            font-size: 0.8rem;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .container {
                padding: 12px;
            }
            .header h1 {
                font-size: 1.5rem;
            }
            model-viewer {
                height: 350px;
            }
            .controls {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>

    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🪑 AR 椅子展示</h1>
            <p>在你的空间中查看这把椅子 · 支持 AR 预览</p>
        </div>

        <!-- 3D Viewer -->
        <div class="viewer-card">
            <model-viewer
                id="chairViewer"
                src="chair.glb"
                alt="3D 椅子模型"
                ar
                ar-modes="scene-viewer webxr quick-look"
                camera-controls
                touch-action="pan-y"
                auto-rotate
                auto-rotate-delay="1000"
                rotation-per-second="30deg"
                shadow-intensity="1.2"
                shadow-softness="0.8"
                exposure="1.0"
                environment-image="neutral"
                camera-orbit="45deg 65deg 3m"
                min-camera-orbit="auto auto 1.5m"
                max-camera-orbit="auto auto 8m"
                loading="eager"
                poster=""
            >
                <div class="progress-bar" slot="progress-bar">
                    <div class="fill" id="progressFill"></div>
                </div>

                <button slot="ar-button" class="ctrl-btn" style="position: absolute; bottom: 16px; right: 16px; font-size: 0.9rem; padding: 10px 20px;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                    </svg>
                    进入 AR
                </button>
            </model-viewer>

            <div class="controls">
                <button class="ctrl-btn active" id="btnRotate" onclick="toggleAutoRotate()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 12a9 9 0 11-6.219-8.56"/>
                        <polyline points="21 3 21 12 12 12"/>
                    </svg>
                    自动旋转
                </button>
                <button class="ctrl-btn" onclick="resetView()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 12a9 9 0 109-9 9.75 9.75 0 00-6.74 2.74L3 8"/>
                        <path d="M3 3v5h5"/>
                    </svg>
                    重置视角
                </button>
                <button class="ctrl-btn" onclick="toggleWireframe()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                        <line x1="3" y1="12" x2="21" y2="12"/>
                        <line x1="12" y1="3" x2="12" y2="21"/>
                    </svg>
                    线框模式
                </button>
            </div>
        </div>

        <!-- Instructions -->
        <div class="instructions">
            <div class="step-card">
                <div class="step-num">1</div>
                <h3>扫描二维码</h3>
                <p>使用手机相机扫描下方二维码打开此页面</p>
            </div>
            <div class="step-card">
                <div class="step-num">2</div>
                <h3>3D 预览</h3>
                <p>在手机上旋转、缩放查看椅子3D模型</p>
            </div>
            <div class="step-card">
                <div class="step-num">3</div>
                <h3>进入 AR</h3>
                <p>点击"进入 AR"按钮，将椅子放入你的真实空间</p>
            </div>
        </div>

        <!-- QR Code -->
        <div class="qr-section">
            <h2>📱 手机扫码体验</h2>
            <p>使用手机相机或微信扫一扫</p>
            <div class="qr-wrapper">
                <img id="qr-image" alt="QR Code">
            </div>
            <div class="qr-url" id="qr-url"></div>
            <p style="margin-top: 12px; color: var(--text-secondary); font-size: 0.82rem;">或在手机浏览器直接输入上方地址</p>
        </div>

        <div class="footer">
            <p>基于 Google Model Viewer · 支持 Android ARCore & iOS AR Quick Look</p>
        </div>
    </div>

    <script>
        // Model viewer reference
        const viewer = document.getElementById('chairViewer');
        const progressFill = document.getElementById('progressFill');
        let isAutoRotate = true;

        // Progress bar
        viewer.addEventListener('progress', (e) => {
            const percent = e.detail.totalProgress * 100;
            progressFill.style.width = percent + '%';
            if (percent >= 100) {
                setTimeout(() => {
                    progressFill.parentElement.style.opacity = '0';
                }, 500);
            }
        });

        // Controls
        function toggleAutoRotate() {
            isAutoRotate = !isAutoRotate;
            viewer.autoRotate = isAutoRotate;
            document.getElementById('btnRotate').classList.toggle('active', isAutoRotate);
        }

        function resetView() {
            viewer.cameraOrbit = '45deg 65deg 3m';
            viewer.cameraTarget = 'auto auto auto';
            viewer.fieldOfView = 'auto';
        }

        let wireframe = false;
        function toggleWireframe() {
            wireframe = !wireframe;
            if (wireframe) {
                viewer.style.background = '#1a1a2e';
            } else {
                viewer.style.background = 'radial-gradient(ellipse at center, #1e1e30, #12121a)';
            }
            event.target.closest('.ctrl-btn').classList.toggle('active', wireframe);
        }

        // Generate QR Code
        function generateQR() {
            // Use the current page URL (works on GitHub Pages, localhost, anywhere)
            const pageUrl = window.location.href;

            // Show the URL
            document.getElementById('qr-url').textContent = pageUrl;

            // Use QR Server API to generate QR code image
            const qrImg = document.getElementById('qr-image');
            const qrApiUrl = 'https://api.qrserver.com/v1/create-qr-code/?size=200x200&color=1a1a2e&bgcolor=ffffff&data=' + encodeURIComponent(pageUrl);
            qrImg.src = qrApiUrl;

            // Fallback: if API fails, show URL text
            qrImg.onerror = function() {
                qrImg.style.display = 'none';
                document.getElementById('qr-url').innerHTML = 
                    '<strong>请在手机浏览器中输入:</strong><br>' + 
                    '<span style="color: #8b83ff; font-size: 1.1rem;">' + pageUrl + '</span>';
            };
        }

        // Generate QR on load
        window.addEventListener('load', generateQR);
    </script>
</body>
</html>
